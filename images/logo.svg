<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" role="img" aria-label="基慈小學校徽">
  <defs>
    <clipPath id="shield">
      <path d="M20 20 H180 V130 Q180 200 100 230 Q20 200 20 130 Z"/>
    </clipPath>
  </defs>
  <!-- outer red border -->
  <path d="M20 20 H180 V130 Q180 200 100 230 Q20 200 20 130 Z" fill="#c8102e" stroke="#c8102e" stroke-width="6"/>
  <g clip-path="url(#shield)">
    <!-- white inner -->
    <rect x="26" y="26" width="148" height="208" fill="#ffffff"/>
    <!-- red top band -->
    <rect x="26" y="26" width="148" height="72" fill="#c8102e"/>
    <!-- blue bottom -->
    <path d="M26 110 H174 V210 Q100 230 26 210 Z" fill="#1d3a8a"/>
    <!-- CCC three interlocking circles -->
    <g fill="none" stroke="#ffffff" stroke-width="5">
      <circle cx="80" cy="55" r="15"/>
      <circle cx="100" cy="55" r="15"/>
      <circle cx="120" cy="55" r="15"/>
    </g>
    <!-- KEI TSZ SCHOOL -->
    <text x="100" y="92" text-anchor="middle" font-family="Arial, 'Helvetica Neue', sans-serif" font-weight="900" font-size="14" fill="#c8102e" letter-spacing="1">KEI TSZ SCHOOL</text>
    <!-- 基慈 -->
    <text x="100" y="180" text-anchor="middle" font-family="'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif" font-weight="900" font-size="54" fill="#ffffff" letter-spacing="4">基慈</text>
  </g>
</svg>
